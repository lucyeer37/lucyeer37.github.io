<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一起拼车吧</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #fff4c7, #dff7ff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 28px;
      padding: 30px 22px;
      text-align: center;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      border: 4px solid #ffe2ee;
    }

    h1 {
      font-size: 42px;
      color: #ff5b7f;
      margin: 10px 0 15px;
    }

    .subtitle {
      font-size: 22px;
      color: #7a3b21;
      font-weight: bold;
      background: #fff0b8;
      border-radius: 999px;
      padding: 12px;
      margin: 18px 0;
    }

    .line {
      font-size: 20px;
      line-height: 1.8;
      color: #333;
      margin: 16px 0;
    }

    .highlight {
      font-size: 26px;
      font-weight: bold;
      color: #149d8a;
      background: #fff7fb;
      border: 3px dashed #ff9db5;
      border-radius: 20px;
      padding: 16px;
      margin-top: 20px;
    }

    .contact {
      margin-top: 24px;
      font-size: 20px;
      color: #333;
      line-height: 1.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 28px;
      background: #ff7aa2;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>一起拼车吧！</h1>

    <div class="subtitle">
      顺路同行，更省钱、更方便
    </div>

    <div class="line">
      💼 上班通勤 · 📷 周末出行 · 🚗 临时约车
    </div>

    <div class="highlight">
      👉 有空位 / 求带 都可以
    </div>

    <div class="contact">
      微信：wxid139xxh
    </div>

    <a class="btn" href=" ">立即联系</a >
  </div>
</body>
</html>
